<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mémoire</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e1a;
    color: #f1c40f;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
    touch-action: manipulation;
  }
  a.back {
    align-self: flex-start;
    color: #f1c40f;
    text-decoration: none;
    font-size: 1rem;
    margin-bottom: 12px;
    padding: 6px 10px;
    border: 1px solid #f1c40f44;
    border-radius: 8px;
    transition: background 0.2s;
  }
  a.back:hover { background: #f1c40f22; }
  h1 { font-size: 1.8rem; margin-bottom: 6px; letter-spacing: 2px; }
  #info-row {
    display: flex;
    gap: 20px;
    margin-bottom: 14px;
    font-size: 0.95rem;
  }
  .info-box {
    background: #12182e;
    border: 1px solid #f1c40f44;
    border-radius: 8px;
    padding: 6px 16px;
    text-align: center;
  }
  .info-box span { display: block; font-size: 1.3rem; font-weight: bold; color: #f1c40f; }
  #win-msg {
    font-size: 1.2rem;
    color: #f1c40f;
    min-height: 1.6em;
    text-align: center;
    margin-bottom: 6px;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    width: min(400px, calc(100vw - 32px));
    margin: 0 auto;
  }
  .card-wrap {
    width: 100%;
    aspect-ratio: 1;
    perspective: 600px;
    cursor: pointer;
  }
  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    border-radius: 10px;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.4rem, 7vw, 2rem);
    user-select: none;
  }
  .card-front {
    background: #12182e;
    border: 2px solid #f1c40f44;
    color: #f1c40f;
    font-size: clamp(1rem, 5vw, 1.4rem);
    font-weight: bold;
  }
  .card-back {
    background: #1a2640;
    border: 2px solid #f1c40f88;
    transform: rotateY(180deg);
  }
  .card-wrap.matched .card-back {
    border-color: #f1c40f;
    background: #1e3020;
    box-shadow: 0 0 10px #f1c40f44;
  }
  #btn-play {
    margin-top: 18px;
    background: #f1c40f;
    color: #0a0e1a;
    border: none;
    border-radius: 10px;
    padding: 12px 32px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #btn-play:hover { opacity: 0.85; }
</style>
</head>
<body>
<a class="back" href="../jeu_societe.html">← Jeux</a>
<h1>Mémoire</h1>
<div id="info-row">
  <div class="info-box">Coups<span id="moves">0</span></div>
  <div class="info-box">Temps<span id="timer">0s</span></div>
  <div class="info-box">Paires<span id="pairs">0/8</span></div>
</div>
<div id="win-msg"></div>
<div id="grid"></div>
<button id="btn-play">Rejouer</button>

<script>
const EMOJIS = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼'];
const gridEl = document.getElementById('grid');
const movesEl = document.getElementById('moves');
const timerEl = document.getElementById('timer');
const pairsEl = document.getElementById('pairs');
const winEl = document.getElementById('win-msg');

let cards = [], flipped = [], matched = 0, moves = 0, locked = false;
let timerInterval = null, startTime = null, elapsed = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function startTimer() {
  stopTimer();
  startTime = Date.now() - elapsed;
  timerInterval = setInterval(() => {
    elapsed = Date.now() - startTime;
    timerEl.textContent = Math.floor(elapsed / 1000) + 's';
  }, 500);
}

function newGame() {
  stopTimer();
  elapsed = 0;
  moves = 0; matched = 0; flipped = []; locked = false;
  movesEl.textContent = '0';
  timerEl.textContent = '0s';
  pairsEl.textContent = '0/8';
  winEl.textContent = '';

  const deck = shuffle([...EMOJIS, ...EMOJIS]);
  gridEl.innerHTML = '';
  cards = deck.map((emoji, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    wrap.dataset.idx = i;
    wrap.innerHTML = `
      <div class="card">
        <div class="card-front">?</div>
        <div class="card-back">${emoji}</div>
      </div>`;
    wrap.addEventListener('click', () => handleClick(i));
    wrap.addEventListener('touchend', e => { e.preventDefault(); handleClick(i); }, { passive: false });
    gridEl.appendChild(wrap);
    return { el: wrap, cardEl: wrap.querySelector('.card'), emoji, revealed: false, matched: false };
  });
}

function handleClick(idx) {
  const card = cards[idx];
  if (locked || card.revealed || card.matched) return;

  // Démarrer timer au 1er clic
  if (!timerInterval) startTimer();

  card.revealed = true;
  card.cardEl.classList.add('flipped');
  flipped.push(idx);

  if (flipped.length === 2) {
    locked = true;
    moves++;
    movesEl.textContent = moves;
    const [a, b] = flipped;

    if (cards[a].emoji === cards[b].emoji) {
      // Paire trouvée
      setTimeout(() => {
        cards[a].matched = true;
        cards[b].matched = true;
        cards[a].el.classList.add('matched');
        cards[b].el.classList.add('matched');
        matched++;
        pairsEl.textContent = `${matched}/8`;
        flipped = [];
        locked = false;
        if (matched === 8) {
          stopTimer();
          const secs = Math.floor(elapsed / 1000);
          winEl.textContent = `Bravo ! ${moves} coups en ${secs}s`;
        }
      }, 300);
    } else {
      // Pas de paire
      setTimeout(() => {
        cards[a].revealed = false;
        cards[b].revealed = false;
        cards[a].cardEl.classList.remove('flipped');
        cards[b].cardEl.classList.remove('flipped');
        flipped = [];
        locked = false;
      }, 900);
    }
  }
}

document.getElementById('btn-play').addEventListener('click', newGame);
newGame();
</script>
</body>
</html>
